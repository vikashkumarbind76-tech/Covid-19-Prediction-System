<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — COVID-19 Prediction System</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #050505;
        --card: rgba(11, 15, 16, 0.9);
        --text: #f8fafc;
        --muted: #94a3b8;
        --ng: #00ffc6;
        --cyan: #06b6d4;
        --pink: #ec4899;
        --purple: #7c3aed;
        --r-xl: 28px;
        --r-lg: 20px;
        --r-md: 14px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Space Grotesk", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        background: var(--card);
        border: 1px solid rgba(0, 255, 198, 0.2);
        border-radius: var(--r-xl);
        padding: 36px;
        box-shadow: 0 40px 100px rgba(0, 0, 0, 0.65);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .mark {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: linear-gradient(
          135deg,
          rgba(0, 255, 198, 0.25),
          rgba(6, 182, 212, 0.15)
        );
        border: 1px solid rgba(0, 255, 198, 0.4);
      }
      .mark i {
        color: var(--cyan);
        font-size: 20px;
      }
      .brand strong {
        font-family: "Sora", sans-serif;
        font-size: 16px;
        font-weight: 800;
      }
      .brand strong em {
        font-style: normal;
        color: var(--ng);
      }
      .sub {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
        margin-bottom: 22px;
      }
      .alert {
        display: none;
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-left: 4px solid #ef4444;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 16px;
        color: rgba(252, 165, 165, 0.95);
        font-size: 13px;
        font-weight: 600;
      }
      .alert.show {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      @media (max-width: 520px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .field {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: rgba(248, 250, 252, 0.8);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 7px;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(0, 255, 198, 0.18);
        background: rgba(5, 5, 5, 0.6);
        color: var(--text);
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 500;
        outline: none;
      }
      input:focus {
        border-color: rgba(0, 255, 198, 0.55);
        box-shadow: 0 0 0 4px rgba(0, 255, 198, 0.1);
        background: rgba(11, 15, 16, 0.8);
      }
      select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(0, 255, 198, 0.18);
        background: rgba(5, 5, 5, 0.6);
        color: var(--text);
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 500;
        outline: none;
      }
      .btn {
        width: 100%;
        padding: 13px 20px;
        border: 0;
        border-radius: 14px;
        cursor: pointer;
        font-family: "Sora", sans-serif;
        font-size: 15px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--ng), var(--cyan));
        color: #000;
        box-shadow: 0 0 30px rgba(0, 255, 198, 0.35);
      }
      .btn:hover {
        transform: translateY(-2px);
      }
      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-top: 14px;
      }
      .link {
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <div class="mark"><i class="fa-solid fa-user-plus"></i></div>
        <strong>COVID-19 <em>Prediction System</em></strong>
      </div>

      <div class="sub">
        Create an account to access your prediction history & dashboard.
      </div>

      {% if error %}
      <div class="alert show">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="post" action="/register">
        <div class="grid">
          <div class="field">
            <label>Full Name</label>
            <input
              name="full_name"
              type="text"
              placeholder="Enter your full name"
              value="{{ full_name or '' }}"
              required
            />
          </div>
          <div class="field">
            <label>Username</label>
            <input
              name="username"
              type="text"
              placeholder="Choose a username"
              value="{{ username or '' }}"
              required
            />
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <input name="email" type="email" placeholder="Optional email" value="{{ email or '' }}" />
        </div>

        <div class="grid">
          <div class="field">
            <label>Password</label>
            <input
              name="password"
              type="password"
              placeholder="Create a password"
              required
              minlength="4"
            />
          </div>
          <div class="field">
            <label>Age</label>
            <input
              name="age"
              type="number"
              placeholder="Age"
              min="1"
              max="120"
              value="{{ age or 25 }}"
            />
          </div>
        </div>

        <div class="field">
          <label>Gender</label>
          <select name="gender">
            <option value="Male" {% if gender == 'Male' or not gender %}selected{% endif %}>Male</option>
            <option value="Female" {% if gender == 'Female' %}selected{% endif %}>Female</option>
            <option value="Other" {% if gender == 'Other' %}selected{% endif %}>Other</option>
          </select>
        </div>

        <button class="btn" type="submit">
          <i class="fa-solid fa-right-to-bracket" style="margin-right: 8px"></i>Create Account
        </button>
      </form>

      <div class="row">
        <a class="link" href="/login"
          ><i class="fa-solid fa-arrow-left" style="margin-right: 8px"></i>Back
          to Login</a
        >
      </div>
    </div>
  </body>
</html>
