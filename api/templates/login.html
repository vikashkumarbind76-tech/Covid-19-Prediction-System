<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — COVID-19 Prediction System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#050505;--card:rgba(11,15,16,.9);--text:#F8FAFC;--muted:#94a3b8;--ng:#00FFC6;--cyan:#06B6D4;--pink:#EC4899;--purple:#7C3AED;--r-xl:28px;--r-lg:20px;--r-md:14px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{width:100%;max-width:480px;background:var(--card);border:1px solid rgba(0,255,198,.2);border-radius:var(--r-xl);padding:36px;box-shadow:0 40px 100px rgba(0,0,0,.65);}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
    .mark{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(0,255,198,.25),rgba(6,182,212,.15));border:1px solid rgba(0,255,198,.4);}
    .mark i{color:var(--cyan);font-size:20px;}
    .brand strong{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;}
    .brand strong em{font-style:normal;color:var(--ng);}
    .sub{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:22px;}
    .alert{display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-left:4px solid #ef4444;border-radius:10px;padding:12px 14px;margin-bottom:16px;color:rgba(252,165,165,.95);font-size:13px;font-weight:600;}
    .alert.success{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3);border-left:4px solid #10b981;color:rgba(167,243,208,.95);}
    .alert.show{display:flex;align-items:center;gap:10px;}
    .field{margin-bottom:16px;}
    label{display:block;font-size:12px;font-weight:700;color:rgba(248,250,252,.8);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;}
    input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(0,255,198,.18);background:rgba(5,5,5,.6);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;outline:none;}
    input:focus{border-color:rgba(0,255,198,.55);box-shadow:0 0 0 4px rgba(0,255,198,.1);background:rgba(11,15,16,.8);}    
    .btn{width:100%;padding:13px 20px;border:0;border-radius:14px;cursor:pointer;font-family:'Sora',sans-serif;font-size:15px;font-weight:800;background:linear-gradient(135deg,var(--ng),var(--cyan));color:#000;box-shadow:0 0 30px rgba(0,255,198,.35);}
    .btn:hover{transform:translateY(-2px);}    
    .row{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-top:10px;}
    .link{color:var(--muted);text-decoration:none;font-size:13px;font-weight:700;}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="mark"><i class="fa-solid fa-shield-virus"></i></div>
      <strong>COVID-19 <em>Prediction System</em></strong>
    </div>

    <div class="sub">Sign in to access your prediction history & dashboard.</div>

    <div class="alert" id="loginAlert">
      <i class="fa-solid fa-circle-exclamation" id="loginAlertIcon"></i>
      <span id="loginAlertText"></span>
    </div>

    <script>
      // Show server-rendered error or success from URL query params
      const qp = new URLSearchParams(window.location.search);
      const qpErr = qp.get('error');
      const qpSuccess = qp.get('success');
      const alertBox = document.getElementById('loginAlert');
      const alertIcon = document.getElementById('loginAlertIcon');
      const alertText = document.getElementById('loginAlertText');

      if (qpErr) {
        alertText.textContent = decodeURIComponent(qpErr);
        alertIcon.className = 'fa-solid fa-circle-exclamation';
        alertBox.classList.add('show');
        setTimeout(() => alertBox.classList.remove('show'), 6000);
      } else if (qpSuccess) {
        alertText.textContent = decodeURIComponent(qpSuccess);
        alertIcon.className = 'fa-solid fa-circle-check';
        alertBox.classList.add('success', 'show');
        setTimeout(() => {
          alertBox.classList.remove('show');
          setTimeout(() => alertBox.classList.remove('success'), 400);
        }, 6000);
      }
    </script>

    <form method="post" action="/login">
      <div class="field">
        <label>Username</label>
        <input name="username" type="text" placeholder="Enter your username" required autocomplete="username" />
      </div>
      <div class="field">
        <label>Password</label>
        <input name="password" type="password" placeholder="Enter your password" required autocomplete="current-password" />
      </div>
      <button class="btn" type="submit"><i class="fa-solid fa-right-to-bracket" style="margin-right:8px;"></i>Login</button>
    </form>

    <div class="row">
      <a class="link" href="/">Back</a>
      <a class="link" href="/register">Create account</a>
    </div>
  </div>
</body>
</html>
